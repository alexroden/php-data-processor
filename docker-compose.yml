services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app_network
  seed-assets:
    image: minio/mc
    depends_on:
      - minio
    volumes:
      - ./assets:/assets:ro
    networks:
      - app_network
    entrypoint: >
      /bin/sh -c "
        until mc alias set local ${S3_URL} ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}; do
          echo 'Waiting for MinIO...';
          sleep 1;
        done;
        mc mb local/processor --ignore-existing;
        mc cp --recursive /assets/. local/processor;
      "

  sqs:
    image: softwaremill/elasticmq:latest
    container_name: elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"
    networks:
      - app_network
  seed-sqs:
    image: amazon/aws-cli
    depends_on:
      - sqs
    entrypoint:
      - aws
      - --endpoint-url=${SQS_URL}
      - sqs
      - create-queue
      - --queue-name
      - ${QUEUE_NAME}
      - --region
      - ${AWS_DEFAULT_REGION}
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    networks:
      - app_network

  mysql:
    image: mysql:8.3
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      retries: 20
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ./migrations:/migrations
    entrypoint:
      [
        "sh",
        "-c",
        "migrate -path /migrations -database \"$DATABASE_URL?x-migrations-table=schema_migrations\" up"
      ]

  runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    env_file:
      - .env
    container_name: php_runner
    networks:
      - app_network

volumes:
  redis_data:
  minio_data:
  mysql_data:

networks:
  app_network: